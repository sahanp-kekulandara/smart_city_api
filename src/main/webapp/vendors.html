<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity | Vendor Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Vendor Management</h2>
            <p class="text-muted small">Verify and manage city business partners</p>
        </div>
        <button class="btn btn-primary d-flex align-items-center gap-2 px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addVendorModal">
            <i data-lucide="plus-circle"></i> Add New Vendor
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Business Name</th>
                    <th>Owner Email</th>
                    <th>Phone Number</th>
                    <th>Verification</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody id="vendorTableBody">
                <tr>
                    <td>
                        <div class="fw-bold">Example Cafe</div>
                        <small class="text-muted">ID: #101</small>
                    </td>
                    <td>owner@example.com</td>
                    <td>+94 77 123 4567</td>
                    <td>
                        <span class="badge bg-warning-subtle text-warning px-3">Pending</span>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-success btn-sm px-3 me-2" onclick="verifyVendor(101)">Verify</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addVendorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Register New Vendor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addVendorForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Link User ID</label>
                            <select class="form-select" id="vUserId" required>
                                <option value="">Select User...</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Business Name</label>
                            <input type="text" class="form-control" id="vName" placeholder="e.g. City Mart" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Description</label>
                        <textarea class="form-control" id="vDescription" rows="2" placeholder="Describe the business..." required></textarea>
                    </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Phone Number</label>
                            <input type="text" class="form-control" id="vPhone" placeholder="+94..." required>
                        </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Latitude</label>
                            <input type="number" step="any" class="form-control" id="vLatitude" placeholder="6.9271" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Longitude</label>
                            <input type="number" step="any" class="form-control" id="vLongitude" placeholder="79.8612" required>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
