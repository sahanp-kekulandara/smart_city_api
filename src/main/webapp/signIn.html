<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kekulandara Admin - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white">

<div class="container-fluid p-0 signin-wrapper">
    <div class="row g-0 h-100">

        <div class="col-lg-6 d-none d-lg-flex signin-left">
            <div class="brand-icon">
                <i data-lucide="shopping-bag"></i>
            </div>
            <h1 class="display-4 fw-bold mb-3">Kekulandara<br>E-Commerce</h1>
            <p class="lead text-white-50 mb-4">Secure Admin Portal v1.0</p>
            <div class="mt-auto small text-white-50">© 2026 Colombo, Sri Lanka</div>
        </div>

        <div class="col-lg-6 signin-right">
            <div class="signin-form-container card border-0 shadow-lg p-5 rounded-4 bg-white">

                <div class="text-center mb-5">
                    <h3 class="fw-bold text-dark">Welcome Back</h3>
                    <p class="text-muted">Sign in to your admin account</p>
                </div>

                <form id="signInForm">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-start-3">
                                <i data-lucide="mail" class="text-muted" style="width: 18px;"></i>
                            </span>
                            <input type="email" class="form-control form-control-lg border-start-0 rounded-end-3" id="adminEmail" placeholder="admin@test.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-start-3">
                                <i data-lucide="lock" class="text-muted" style="width: 18px;"></i>
                            </span>
                            <input type="password" class="form-control form-control-lg border-start-0 rounded-end-3" id="adminPassword" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-signin btn-lg shadow-sm" id="submitBtn">
                        <span id="btnText">Sign In</span>
                        <div id="btnLoading" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>

                    <div id="signInError" class="alert alert-danger d-none mt-3 small text-center">
                        Invalid credentials. Please try again.
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
