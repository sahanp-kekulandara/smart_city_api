<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1 text-dark">Product Inventory</h2>
                <p class="text-muted mb-0">Manage stock, categories, and pricing.</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary border-2 fw-semibold px-4 rounded-pill shadow-sm"
                        data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="loadCategories()">
                    <i data-lucide="layers" class="me-2" style="width: 18px;"></i>Categories
                </button>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-3 rounded-4 bg-white">
                    <small class="text-muted fw-medium text-uppercase">Total Products</small>
                    <h3 class="fw-bold mb-0" id="totalProductsCount">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-3 rounded-4 bg-white border-start border-warning border-4">
                    <small class="text-muted fw-medium text-uppercase">Low Stock Items</small>
                    <h3 class="fw-bold mb-0 text-warning" id="lowStockCount">0</h3>
                </div>
            </div>
            <div class="col-md-6">
                <div class="input-group input-group-lg shadow-sm rounded-4 overflow-hidden">
                        <span class="input-group-text bg-white border-0">
                            <i data-lucide="search" class="text-muted"></i>
                        </span>
                    <input type="text" id="productSearch" class="form-control border-0"
                           placeholder="Search products by name or category...">
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted small text-uppercase">
                        <tr>
                            <th class="px-4 py-3">Product Name</th>
                            <th class="px-4 py-3">Category</th>
                            <th class="px-4 py-3">Price</th>
                            <th class="px-4 py-3">Stock</th>
                        </tr>
                        </thead>
                        <tbody id="productTableBody">
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="mt-2 text-muted">Loading products...</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg rounded-4">

            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold mb-0">Manage Categories</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body pt-4">
                <div class="mb-4 bg-light p-3 rounded-3 border">
                    <label class="form-label small fw-bold text-dark">Add New Category</label>
                    <div class="input-group">
                        <input type="text" id="newCatName" class="form-control"
                               placeholder="e.g., Electronics, Fashion">
                        <button class="btn btn-primary px-4" onclick="saveNewCategory()">Add</button>
                    </div>
                </div>

                <h6 class="fw-bold text-muted mb-3 text-uppercase small">Existing Categories</h6>
                <div class="card border-0 border-top rounded-0">
                    <ul class="list-group list-group-flush" id="categoryList">
                        <li class="list-group-item text-center text-muted py-3">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            Loading...
                        </li>
                    </ul>
                </div>
            </div>

            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
