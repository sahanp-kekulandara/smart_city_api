<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="sectionTitle" class="fw-bold text-dark">System Overview</h2>
        <div class="bg-white p-2 rounded-circle shadow-sm">
            <i data-lucide="bell" class="text-secondary"></i>
        </div>
    </div>

    <div id="dashboardStats" class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card stat-card p-3 bg-white border-0 shadow-sm">
                <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Total Vendors</small>
                <h2 class="mb-0 mt-1" id="statVendors">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3 bg-primary text-white border-0 shadow-sm">
                <small class="opacity-75 text-uppercase fw-bold" style="font-size: 0.7rem;">Active Orders</small>
                <h2 class="mb-0 mt-1" id="statOrders">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3 bg-white border-0 shadow-sm">
                <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Total Users</small>
                <h2 class="mb-0 mt-1" id="statUsers">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3 bg-success text-white border-0 shadow-sm">
                <small class="opacity-75 text-uppercase fw-bold" style="font-size: 0.7rem;">Revenue</small>
                <h2 class="mb-0 mt-1" id="statRevenue">Rs. 0.0</h2>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                <h5 class="fw-bold mb-4 text-muted">Weekly Activity</h5>

                <div style="height: 250px; position: relative;">
                    <canvas id="orderChart"></canvas>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
