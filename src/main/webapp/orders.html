<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="container-fluid">

        <div class="mb-4">
            <h2 class="fw-bold mb-1">Order Management</h2>
            <p class="text-muted">Track customer purchases and shipping status.</p>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-3 rounded-4 bg-white">
                    <small class="text-muted fw-medium text-uppercase">Total Orders</small>
                    <h3 class="fw-bold mb-0" id="totalOrderCount">0</h3>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted small text-uppercase">
                        <tr>
                            <th class="px-4 py-3">Order ID</th>
                            <th class="px-4 py-3">Customer</th>
                            <th class="px-4 py-3">Total Amount</th>
                            <th class="px-4 py-3">Status</th>
                            <th class="px-4 py-3 text-end">Details</th>
                        </tr>
                        </thead>
                        <tbody id="orderTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Order #<span id="detailOrderId"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-4">
                        <div class="col-md-5">
                            <h6 class="fw-bold text-muted small text-uppercase mb-3">Shipping Address</h6>
                            <div class="p-3 bg-light rounded-3 border">
                                <p class="mb-1 fw-bold" id="shipName"></p>
                                <p class="mb-1 text-secondary" id="shipAddress"></p>
                                <p class="mb-0 text-secondary" id="shipCity"></p>
                            </div>
                        </div>
                        <div class="col-md-7">
                            <h6 class="fw-bold text-muted small text-uppercase mb-3">Ordered Products</h6>
                            <ul class="list-group list-group-flush border rounded-3" id="orderItemsList">
                            </ul>
                            <div class="d-flex justify-content-between mt-3 px-2">
                                <span class="fw-bold">Grand Total:</span>
                                <span class="fw-bold text-primary" id="detailTotal"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
